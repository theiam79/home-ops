---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: hermod-nats
  namespace: &namespace hermod
spec:
  interval: 1h
  path: ./kubernetes/apps/hermod/nats/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  wait: true
