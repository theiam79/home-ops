---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nats
spec:
  chart:
    spec:
      chart: nats
      version: 2.12.5
      sourceRef:
        kind: HelmRepository
        name: nats
  interval: 1h
  values:
    config:
      cluster:
        enabled: false
      jetstream:
        enabled: false
    container:
      image:
        repository: nats
        tag: 2.12.5-alpine
      merge:
        resources:
          requests:
            cpu: 10m
          limits:
            memory: 64Mi
    reloader:
      merge:
        resources:
          requests:
            cpu: 10m
          limits:
            memory: 32Mi
