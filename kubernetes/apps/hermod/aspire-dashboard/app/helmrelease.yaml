---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: aspire-dashboard
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      aspire-dashboard:
        containers:
          app:
            image:
              repository: mcr.microsoft.com/dotnet/aspire-dashboard
              tag: 13.1
            env:
              TZ: America/Chicago
              DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
            ports:
              - name: http
                containerPort: 18888
                protocol: TCP
              - name: otlp
                containerPort: 18889
                protocol: TCP
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
    service:
      app:
        controller: aspire-dashboard
        ports:
          http:
            port: 18888
          otlp:
            port: 18889
    route:
      app:
        hostnames:
          - "aspire.beta.hermod.dev"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https-hermod
        rules:
          - backendRefs:
              - identifier: app
                port: 18888
