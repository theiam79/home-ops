---
# Places the HA pod on the IoT VLAN (10.1.30.0/24) for Google Cast — see ../README.md.
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: iot
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "iot",
      "plugins": [
        {
          "type": "ipvlan",
          "master": "mgmt0.30",
          "mode": "l2",
          "capabilities": { "ips": true },
          "ipam": {
            "type": "static"
          }
        }
      ]
    }
