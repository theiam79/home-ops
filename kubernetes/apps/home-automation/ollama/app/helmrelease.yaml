---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      ollama:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/ollama/ollama
              tag: 0.30.10
            env:
              TZ: America/Chicago
              OLLAMA_HOST: 0.0.0.0:11434
              # Keep the model resident in VRAM between requests (no reload
              # latency on every Assist call). -1 = never evict.
              OLLAMA_KEEP_ALIVE: "-1"
              # Run as a non-root user; point HOME + model store at the PVC.
              HOME: /data
              OLLAMA_MODELS: /data/models
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 11434
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  failureThreshold: 60
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 200m
                memory: 2Gi
              limits:
                # One time-sliced slot on elli's RTX 3080. Forces scheduling
                # onto the GPU node; request is auto-set equal to the limit.
                nvidia.com/gpu: 1
    defaultPodOptions:
      # Run under the containerd "nvidia" runtime (Talos toolkit extension).
      runtimeClassName: nvidia
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: ollama
        ports:
          http:
            primary: true
            port: *port
    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 50Gi
        storageClass: ceph-block
        globalMounts:
          - path: /data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
