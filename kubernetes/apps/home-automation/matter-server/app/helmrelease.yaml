---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: matter-server
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      matter-server:
        # Fixed IoT-VLAN IP + RWO PVC — no two pods at once. See ../README.md.
        strategy: Recreate
        initContainers:
          # Accept the OTBR's route into the Thread mesh on net1 — see ../README.md.
          sysctl:
            image:
              repository: ghcr.io/home-operations/busybox
              tag: 1.38.0@sha256:7e2c04dd50ede647bf4a7a4c8dbd629dd4971cd139b9b88fb22bfc3c7a6c13df
            command:
              - sh
              - -c
              - >-
                sysctl -w
                net.ipv6.conf.net1.accept_ra=2
                net.ipv6.conf.net1.accept_ra_rt_info_max_plen=64
            securityContext:
              privileged: true
              runAsNonRoot: false
              runAsUser: 0
        containers:
          app:
            image:
              repository: ghcr.io/home-assistant-libs/python-matter-server
              tag: 8.1.0@sha256:170aa093ce91c76cde4cc390918307590f0f5558fcec93f913af3cb019e6562a
            args:
              - --storage-path
              - /data
              - --paa-root-cert-dir
              - /data/credentials
              - --primary-interface
              - net1
            env:
              TZ: America/Chicago
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 5580
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
    defaultPodOptions:
      annotations:
        # net1 on the IoT VLAN next to HA (.5) — see ../README.md.
        k8s.v1.cni.cncf.io/networks: |
          [{"name":"iot","namespace":"home-automation","ips":["10.1.30.6/24"]}]
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: matter-server
        ports:
          websocket:
            primary: true
            port: *port
    persistence:
      data:
        existingClaim: matter-server
        globalMounts:
          - path: /data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
