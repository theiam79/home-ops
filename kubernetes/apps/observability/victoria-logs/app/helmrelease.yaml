---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: victoria-logs
  values:
    global:
      image:
        registry: quay.io
    dashboards:
      enabled: true
      labels:
        grafana_dashboard: "1"
    server:
      fullnameOverride: victoria-logs
      persistentVolume:
        enabled: true
        storageClassName: ceph-block
        size: 50Gi
      retentionPeriod: 90d
      route:
        enabled: true
        hostnames:
          - vlogs.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
      serviceMonitor:
        enabled: true
