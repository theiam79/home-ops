---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kometa
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      kometa:
        type: cronjob
        cronjob:
          schedule: "0 3 * * *"
          backoffLimit: 0
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 1
        containers:
          app:
            image:
              repository: kometateam/kometa
              tag: v2.0.2
            env:
              TZ: America/Chicago
              KOMETA_RUN: "true"
              KOMETA_CONFIG: /config/config.yml
            envFrom:
              - secretRef:
                  name: kometa-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 1Gi
        pod:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
    persistence:
      config:
        existingClaim: kometa
        globalMounts:
          - path: /config
      config-file:
        type: configMap
        identifier: config
        globalMounts:
          - path: /config/config.yml
            subPath: config.yml
            readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
    configMaps:
      config:
        data:
          config.yml: |
            libraries:
              Movies:
                collection_files:
                  - default: basic
              TV Shows:
                collection_files:
                  - default: basic
            plex:
              url: http://plex.media:32400
              token: <<PLEX_TOKEN>>
