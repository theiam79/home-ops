---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: booksync
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      booksync:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/drallgood/audiobookshelf-hardcover-sync
              tag: 3.2.0
            env:
              TZ: America/Chicago
              ENABLE_WEB_UI: "true"
              AUDIOBOOKSHELF_URL: "http://audiobookshelf"
              LOG_LEVEL: info
              DATA_DIR: /app/data
              AUTH_ENABLED: "true"
              KEYCLOAK_ENABLED: "true"
              KEYCLOAK_ISSUER: "https://auth.${SECRET_DOMAIN}"
              KEYCLOAK_CLIENT_ID: booksync
              KEYCLOAK_REDIRECT_URI: "https://booksync.${SECRET_DOMAIN}/auth/callback/keycloak"
              KEYCLOAK_SCOPES: "openid profile email groups"
              KEYCLOAK_ROLE_CLAIM: groups
            envFrom:
              - secretRef:
                  name: booksync-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: &port 8080
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *port
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: booksync
        ports:
          http:
            primary: true
            port: *port
    route:
      app:
        hostnames:
          - "booksync.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      data:
        existingClaim: booksync
        globalMounts:
          - path: /app/data
      cache:
        type: emptyDir
        globalMounts:
          - path: /app/cache
      mismatches:
        type: emptyDir
        globalMounts:
          - path: /app/mismatches
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
