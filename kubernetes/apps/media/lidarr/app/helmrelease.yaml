---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lidarr
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      lidarr:
        containers:
          app:
            image:
              repository: ghcr.io/hotio/lidarr
              tag: nightly
            env:
              TZ: America/Chicago
              PUID: "1000"
              PGID: "1000"
              LIDARR__APP__INSTANCENAME: Lidarr
              LIDARR__AUTH__METHOD: External
              LIDARR__AUTH__REQUIRED: DisabledForLocalAddresses
              LIDARR__SERVER__PORT: &port 8686
              LIDARR__LOG__LEVEL: info
              LIDARR__APP__THEME: dark
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /ping
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: lidarr
        ports:
          http:
            primary: true
            port: *port
    route:
      app:
        hostnames:
          - "lidarr.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      config:
        existingClaim: lidarr
        globalMounts:
          - path: /config
      media:
        type: nfs
        server: snotra.internal
        path: /mnt/user/media
        globalMounts:
          - path: /data/media
      downloads:
        type: nfs
        server: snotra.internal
        path: /mnt/disks/85AAZU6GS/cluster/downloads
        globalMounts:
          - path: /data/downloads
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
