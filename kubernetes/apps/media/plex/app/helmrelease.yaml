---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      plex:
        containers:
          app:
            image:
              repository: plexinc/pms-docker
              tag: 1.43.0.10492-121068a07
            env:
              TZ: America/Chicago
              PLEX_UID: "1000"
              PLEX_GID: "1000"
              ADVERTISE_IP: "https://plex.${SECRET_DOMAIN}:443,http://192.168.100.35:32400"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /identity
                    port: 32400
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /identity
                    port: 32400
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  failureThreshold: 30
            resources:
              requests:
                cpu: 100m
                memory: 2Gi
                gpu.intel.com/i915: "1"
              limits:
                memory: 32Gi
                gpu.intel.com/i915: "1"
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups:
          - 44
          - 105
    service:
      app:
        controller: plex
        type: LoadBalancer
        externalTrafficPolicy: Local
        annotations:
          lbipam.cilium.io/ips: "192.168.100.35"
        ports:
          http:
            primary: true
            port: 32400
    route:
      app:
        hostnames:
          - "plex.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: 32400
    persistence:
      config:
        existingClaim: plex
        globalMounts:
          - path: /config
      media:
        type: nfs
        server: snotra.internal
        path: /mnt/user/media
        globalMounts:
          - path: /data/media
            readOnly: true
      transcode:
        type: emptyDir
        globalMounts:
          - path: /transcode
