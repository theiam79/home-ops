---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: audiobookshelf
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      audiobookshelf:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/advplyr/audiobookshelf
              tag: 2.33.1
            env:
              TZ: America/Chicago
              PORT: &port 80
              CONFIG_PATH: /config
              METADATA_PATH: /config/metadata
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthcheck
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 50m
                memory: 512Mi
          abs-agg:
            image:
              repository: ghcr.io/vito0912/abs-agg
              tag: latest
            env:
              TZ: America/Chicago
            envFrom:
              - secretRef:
                  name: abs-agg-secret
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
    service:
      app:
        controller: audiobookshelf
        ports:
          http:
            primary: true
            port: *port
    route:
      app:
        hostnames:
          - "audiobookshelf.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      config:
        existingClaim: audiobookshelf
        advancedMounts:
          audiobookshelf:
            app:
              - path: /config
      abs-agg-data:
        type: emptyDir
        advancedMounts:
          audiobookshelf:
            abs-agg:
              - path: /app/data
      media:
        type: nfs
        server: snotra.internal
        path: /mnt/user/media
        globalMounts:
          - path: /data/media
