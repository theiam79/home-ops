---
apiVersion: v1
kind: ConfigMap
metadata:
  name: recyclarr-configmap
data:
  recyclarr.yml: |
    sonarr:
      sonarr:
        base_url: http://sonarr.media.svc.cluster.local
        api_key: !env_var SONARR_API_KEY
        delete_old_custom_formats: true

        include:
          - template: sonarr-quality-definition-series
          - template: sonarr-v4-quality-profile-web-1080p
          - template: sonarr-v4-custom-formats-web-1080p
          - template: sonarr-quality-definition-anime
          - template: sonarr-v4-quality-profile-anime
          - template: sonarr-v4-custom-formats-anime

        custom_formats:
          # Anime - prefer dual audio and 10bit
          - trash_ids:
              - 418f50b10f1907201b6cfdf881f467b7 # Anime Dual Audio
            assign_scores_to:
              - name: Remux-1080p - Anime
                score: 10
          - trash_ids:
              - b2550eb333d27b75833e25b8c2557b38 # 10bit
            assign_scores_to:
              - name: Remux-1080p - Anime
                score: 10
          - trash_ids:
              - 026d5aadd1a6b4e550b134cb6c72b3ca # Uncensored
            assign_scores_to:
              - name: Remux-1080p - Anime
                score: 10

      sonarr4k:
        base_url: http://sonarr4k.media.svc.cluster.local
        api_key: !env_var SONARR4K_API_KEY
        delete_old_custom_formats: true

        include:
          - template: sonarr-quality-definition-series
          - template: sonarr-v4-quality-profile-web-2160p
          - template: sonarr-v4-custom-formats-web-2160p

        custom_formats:
          # HDR Formats
          - trash_ids:
              - 9b27ab6498ec0f31a3353992e19434ca # DV (w/o HDR fallback)
            assign_scores_to:
              - name: WEB-2160p
          # Block SDR
          - trash_ids:
              - 2016d1676f5ee13a5b7257ff86ac9a93 # SDR
            assign_scores_to:
              - name: WEB-2160p

    radarr:
      radarr:
        base_url: http://radarr.media.svc.cluster.local
        api_key: !env_var RADARR_API_KEY
        delete_old_custom_formats: true

        include:
          - template: radarr-quality-definition-movie
          - template: radarr-quality-profile-remux-web-1080p
          - template: radarr-custom-formats-remux-web-1080p

      radarr4k:
        base_url: http://radarr4k.media.svc.cluster.local
        api_key: !env_var RADARR4K_API_KEY
        delete_old_custom_formats: true

        include:
          - template: radarr-quality-definition-movie
          - template: radarr-quality-profile-remux-web-2160p
          - template: radarr-custom-formats-remux-web-2160p

        custom_formats:
          # Block DV without HDR fallback
          - trash_ids:
              - 923b6abef9b17f937fab56cfcf89e1f1 # DV (w/o HDR fallback)
            assign_scores_to:
              - name: Remux + WEB 2160p
          # Block SDR
          - trash_ids:
              - 9c38ebb7384dada637be8899efa68e6f # SDR
            assign_scores_to:
              - name: Remux + WEB 2160p
