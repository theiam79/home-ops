---
apiVersion: v1
kind: ConfigMap
metadata:
  name: recyclarr-configmap
data:
  recyclarr.yml: |
    sonarr:
      sonarr:
        base_url: http://sonarr.media.svc.cluster.local
        api_key: !env_var SONARR_API_KEY
        delete_old_custom_formats: true

        media_naming:
          series: plex-imdb
          season: default
          episodes:
            rename: true
            standard: default
            daily: default
            anime: default

        quality_definition:
          type: series

        quality_profiles:
          - trash_id: 72dae194fc92bf828f32cde7744e51a1 # WEB-1080p
            reset_unmatched_scores:
              enabled: true
          - trash_id: 20e0fc959f1f1704bed501f23bdae76f # [Anime] Remux-1080p
            reset_unmatched_scores:
              enabled: true

        custom_formats:
          # Anime - prefer dual audio and 10bit
          - trash_ids:
              - 418f50b10f1907201b6cfdf881f467b7 # Anime Dual Audio
            assign_scores_to:
              - name: "[Anime] Remux-1080p"
                score: 10
          - trash_ids:
              - b2550eb333d27b75833e25b8c2557b38 # 10bit
            assign_scores_to:
              - name: "[Anime] Remux-1080p"
                score: 10
          - trash_ids:
              - 026d5aadd1a6b4e550b134cb6c72b3ca # Uncensored
            assign_scores_to:
              - name: "[Anime] Remux-1080p"
                score: 10

      sonarr4k:
        base_url: http://sonarr4k.media.svc.cluster.local
        api_key: !env_var SONARR4K_API_KEY
        delete_old_custom_formats: true

        media_naming:
          series: plex-imdb
          season: default
          episodes:
            rename: true
            standard: default
            daily: default

        quality_definition:
          type: series

        quality_profiles:
          - trash_id: d1498e7d189fbe6c7110ceaabb7473e6 # WEB-2160p
            reset_unmatched_scores:
              enabled: true

        custom_formats:
          # HDR Formats
          - trash_ids:
              - 9b27ab6498ec0f31a3353992e19434ca # DV (w/o HDR fallback)
            assign_scores_to:
              - name: WEB-2160p
          # Block SDR
          - trash_ids:
              - 2016d1676f5ee13a5b7257ff86ac9a93 # SDR
            assign_scores_to:
              - name: WEB-2160p

    radarr:
      radarr:
        base_url: http://radarr.media.svc.cluster.local
        api_key: !env_var RADARR_API_KEY
        delete_old_custom_formats: true

        media_naming:
          folder: plex-imdb
          movie:
            rename: true
            standard: plex-imdb

        quality_definition:
          type: movie

        quality_profiles:
          - trash_id: 9ca12ea80aa55ef916e3751f4b874151 # Remux + WEB 1080p
            reset_unmatched_scores:
              enabled: true

      radarr4k:
        base_url: http://radarr4k.media.svc.cluster.local
        api_key: !env_var RADARR4K_API_KEY
        delete_old_custom_formats: true

        media_naming:
          folder: plex-imdb
          movie:
            rename: true
            standard: plex-imdb

        quality_definition:
          type: movie

        quality_profiles:
          - trash_id: fd161a61e3ab826d3a22d53f935696dd # Remux + WEB 2160p
            reset_unmatched_scores:
              enabled: true

        custom_formats:
          # Block DV without HDR fallback
          - trash_ids:
              - 923b6abef9b17f937fab56cfcf89e1f1 # DV (w/o HDR fallback)
            assign_scores_to:
              - name: Remux + WEB 2160p
          # Block SDR
          - trash_ids:
              - 9c38ebb7384dada637be8899efa68e6f # SDR
            assign_scores_to:
              - name: Remux + WEB 2160p
