---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: shelfmark
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      shelfmark:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/theiam79/shelfmark
              tag: audiobookshelf-upload
            env:
              TZ: America/Chicago
              PUID: "99"
              PGID: "100"
            envFrom:
              - secretRef:
                  name: shelfmark-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 8084
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  failureThreshold: 30
            resources:
              requests:
                cpu: 10m
                memory: 512Mi
    service:
      app:
        controller: shelfmark
        ports:
          http:
            primary: true
            port: *port
    route:
      app:
        hostnames:
          - "shelfmark.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      config:
        existingClaim: shelfmark
        globalMounts:
          - path: /config
      media:
        type: nfs
        server: snotra.cluster
        path: /mnt/user/media
        globalMounts:
          - path: /data/media
      downloads:
        type: nfs
        server: snotra.cluster
        path: /mnt/disks/85AAZU6GS/cluster/downloads
        globalMounts:
          - path: /data/downloads
      bookdrop:
        type: nfs
        server: snotra.cluster
        path: /mnt/disks/85AAZU6GS/cluster/imports/books
        globalMounts:
          - path: /bookdrop

