---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  timeout: 15m
  values:
    controllers:
      qbittorrent:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          annotations:
            k8s.v1.cni.cncf.io/networks: |
              [{
                "name": "vpn-vlan70",
                "namespace": "media",
                "ips": ["192.168.70.32/24"]
              }]
        initContainers:
          # Route all non-cluster egress (qbittorrent AND mousehole) via the
          # VPN VLAN — see ../vpn-network/README.md
          routing:
            image:
              repository: ghcr.io/nicolaka/netshoot
              tag: v0.16@sha256:b09d9b21381f47a79b3cbcb30da25266dc17186ea00ae65e99fdc51396f48e70
            command:
              - /bin/bash
              - -c
              - |
                set -e
                GW=$(ip route show default dev eth0 | awk '{print $3}')
                ip route replace 10.42.0.0/15 via "$GW" dev eth0
                ip route replace 192.168.100.0/24 via "$GW" dev eth0
                ip route replace default via 192.168.70.1 dev net1 onlink
                ip route show
            securityContext:
              runAsNonRoot: false
              runAsUser: 0
              capabilities:
                add: ["NET_ADMIN"]
            resources:
              requests:
                cpu: 5m
                memory: 16Mi
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/qbittorrent-libtorrentv1
              tag: 5.2.2
            env:
              TZ: America/Chicago
              QBT_TORRENTING_PORT: "35338"
              QBT_WEBUI_PORT: &port 8080
            ports:
              - containerPort: *port
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v2/app/version
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
            resources:
              requests:
                cpu: 50m
                memory: 1Gi
          mousehole:
            image:
              repository: tmmrtn/mousehole
              tag: 0.5.0
            env:
              TZ: America/Chicago
              MOUSEHOLE_STATE_DIR_PATH: /srv/mousehole  # 0.5.0 default moved to /var/lib; pin to existing PVC mount
              MOUSEHOLE_ALLOWED_HOSTS: "mousehole.${SECRET_DOMAIN}"
              MOUSEHOLE_ALLOWED_ORIGINS: "https://mousehole.${SECRET_DOMAIN}"
              MOUSEHOLE_AUTH_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: qbittorrent-secret
                    key: MOUSEHOLE_AUTH_PASSWORD
            ports:
              - containerPort: 5010
            probes:
              # liveness is TCP-only: /ok and /health both report MAM
              # reachability (isOnline), so an HTTP probe restarts the
              # container on every VPN/MAM blip. TCP only trips on real death.
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 5010
                  periodSeconds: 30
                  failureThreshold: 5
              readiness:
                enabled: false
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: qbittorrent
        ports:
          http:
            primary: true
            port: *port
      mousehole:
        controller: qbittorrent
        ports:
          http:
            port: 5010
    route:
      app:
        hostnames:
          - "qbittorrent.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
      mousehole:
        hostnames:
          - "mousehole.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: mousehole
                port: 5010
    persistence:
      config:
        existingClaim: qbittorrent
        advancedMounts:
          qbittorrent:
            app:
              - path: /config
      media:
        type: nfs
        server: snotra.cluster
        path: /mnt/user/media
        advancedMounts:
          qbittorrent:
            app:
              - path: /data/media
      downloads:
        type: nfs
        server: snotra.cluster
        path: /mnt/disks/85AAZU6GS/cluster/downloads
        advancedMounts:
          qbittorrent:
            app:
              - path: /data/downloads
      tmp:
        type: emptyDir
        advancedMounts:
          qbittorrent:
            app:
              - path: /tmp
      mousehole-data:
        existingClaim: mousehole
        advancedMounts:
          qbittorrent:
            mousehole:
              - path: /srv/mousehole
