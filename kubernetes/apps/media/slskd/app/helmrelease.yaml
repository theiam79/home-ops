---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: slskd
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  timeout: 15m
  values:
    controllers:
      slskd:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          annotations:
            k8s.v1.cni.cncf.io/networks: |
              [{
                "name": "vpn-vlan70",
                "namespace": "media",
                "ips": ["192.168.70.33/24"]
              }]
        initContainers:
          # slskd can't bind outbound soulseek traffic to an address, so route
          # all non-cluster egress via the VPN VLAN — see ../vpn-network/README.md
          routing:
            image:
              repository: ghcr.io/nicolaka/netshoot
              tag: v0.16@sha256:b09d9b21381f47a79b3cbcb30da25266dc17186ea00ae65e99fdc51396f48e70
            command:
              - /bin/bash
              - -c
              - |
                set -e
                GW=$(ip route show default dev eth0 | awk '{print $3}')
                ip route add 10.42.0.0/15 via "$GW" dev eth0
                ip route replace default via 192.168.70.1 dev net1
                ip route show
            securityContext:
              runAsNonRoot: false
              runAsUser: 0
              capabilities:
                add: ["NET_ADMIN"]
            resources:
              requests:
                cpu: 5m
                memory: 16Mi
        containers:
          app:
            image:
              repository: ghcr.io/slskd/slskd
              tag: 0.25.1
            env:
              TZ: America/Chicago
              SLSKD_REMOTE_CONFIGURATION: "true"
              SLSKD_HTTP_PORT: &port 5030
              SLSKD_SLSK_LISTEN_IP_ADDRESS: 192.168.70.33
            envFrom:
              - secretRef:
                  name: slskd-secret
            ports:
              - containerPort: *port
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: slskd
        ports:
          http:
            primary: true
            port: *port
    route:
      app:
        hostnames:
          - "slskd.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      config:
        existingClaim: slskd
        advancedMounts:
          slskd:
            app:
              - path: /app
      media:
        type: nfs
        server: snotra.cluster
        path: /mnt/user/media
        advancedMounts:
          slskd:
            app:
              - path: /data/media
                readOnly: true
      downloads:
        type: nfs
        server: snotra.cluster
        path: /mnt/disks/85AAZU6GS/cluster/downloads
        advancedMounts:
          slskd:
            app:
              - path: /data/downloads
      tmp:
        type: emptyDir
        advancedMounts:
          slskd:
            app:
              - path: /tmp
