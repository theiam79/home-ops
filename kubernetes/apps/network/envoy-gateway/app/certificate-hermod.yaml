---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: hermod-dev-production
spec:
  dnsNames:
    - "hermod.dev"
    - "*.hermod.dev"
  duration: 160h
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  privateKey:
    algorithm: ECDSA
  secretName: hermod-dev-production-tls
  usages:
    - digital signature
