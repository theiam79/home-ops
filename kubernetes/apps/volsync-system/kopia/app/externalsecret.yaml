---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kopia
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: kopia-secret
    template:
      data:
        KOPIA_PASSWORD: "{{ .KOPIA_PASSWORD }}"
  data:
  - secretKey: KOPIA_PASSWORD
    remoteRef:
      key: "b3339cc4-a895-45a0-a368-b2f50069d9cd"
