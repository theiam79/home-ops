---
apiVersion: volsync.backube/v1alpha1
kind: KopiaMaintenance
metadata:
  name: daily
spec:
  enabled: true
  trigger:
    schedule: "30 3,15 * * *"
  moverVolumes:
    - mountPath: repository
      volumeSource:
        nfs:
          path: /mnt/user/volsync-kopia
          server: snotra.cluster
  repository:
    repository: volsync-maintenance-secret
