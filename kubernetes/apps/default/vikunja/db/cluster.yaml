---
# yaml-language-server: $schema=https://github.com/datreeio/CRDs-catalog/raw/refs/heads/main/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: vikunja-pg
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: "enabled"
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17
  storage:
    size: 5Gi
    storageClass: ceph-block
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 50m
  bootstrap:
    initdb:
      database: vikunja
      owner: vikunja
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: vikunja-pg-backup
        serverName: vikunja-pg-v1
---
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: vikunja-pg-backup
spec:
  retentionPolicy: "15d"
  configuration:
    destinationPath: "s3://cnpg/vikunja/"
    endpointURL: "http://garage.internal:3900"
    s3Credentials:
      region:
        name: vikunja-cnpg-secret
        key: AWS_REGION
      accessKeyId:
        name: vikunja-cnpg-secret
        key: AWS_ACCESS_KEY_ID
      secretAccessKey:
        name: vikunja-cnpg-secret
        key: AWS_SECRET_ACCESS_KEY
  instanceSidecarConfiguration:
    env:
      - name: AWS_REQUEST_CHECKSUM_CALCULATION
        value: when_required
      - name: AWS_RESPONSE_CHECKSUM_VALIDATION
        value: when_required
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: vikunja-pg
spec:
  backupOwnerReference: self
  cluster:
    name: vikunja-pg
  schedule: "0 0 3 * * *"
  immediate: true
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
