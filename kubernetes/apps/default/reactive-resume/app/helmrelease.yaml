---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reactive-resume
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      reactive-resume:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/amruthpillai/reactive-resume
              tag: v5.2.3
            env:
              TZ: America/Chicago
              NODE_ENV: production
              PORT: &port 3000
              APP_URL: "https://resume.${SECRET_DOMAIN}"
              # OIDC (Authelia) — discovery handles auth/token/userinfo
              OAUTH_PROVIDER_NAME: Authelia
              OAUTH_CLIENT_ID: reactive-resume
              OAUTH_DISCOVERY_URL: "https://auth.${SECRET_DOMAIN}/.well-known/openid-configuration"
              OAUTH_SCOPES: openid profile email
              # Auth feature flags — OIDC-only (signups must stay enabled
              # so OIDC can provision users on first login; Authelia is the
              # actual access gate)
              FLAG_DISABLE_SIGNUPS: "false"
              FLAG_DISABLE_EMAIL_AUTH: "true"
              FLAG_DISABLE_IMAGE_PROCESSING: "false"
              # S3 (Garage) — file uploads bucket
              S3_REGION: garage
              S3_ENDPOINT: "http://garage.internal:3900"
              S3_BUCKET: reactive-resume
              S3_FORCE_PATH_STYLE: "true"
              # Postgres — full connection string from CNPG-generated app secret
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: reactive-resume-pg-app
                    key: uri
            envFrom:
              # AUTH_SECRET, OAUTH_CLIENT_SECRET, S3_ACCESS_KEY_ID,
              # S3_SECRET_ACCESS_KEY
              - secretRef:
                  name: reactive-resume-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
              limits:
                memory: 1Gi
    defaultPodOptions:
      enableServiceLinks: false
    service:
      app:
        controller: reactive-resume
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "resume.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      data:
        existingClaim: reactive-resume
        advancedMounts:
          reactive-resume:
            app:
              - path: /app/data
