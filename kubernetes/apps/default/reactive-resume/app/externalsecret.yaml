---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: reactive-resume
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: reactive-resume-secret
    template:
      data:
        AUTH_SECRET: "{{ .AUTH_SECRET }}"
        OAUTH_CLIENT_SECRET: "{{ .OAUTH_CLIENT_SECRET }}"
        S3_ACCESS_KEY_ID: "{{ .S3_ACCESS_KEY_ID }}"
        S3_SECRET_ACCESS_KEY: "{{ .S3_SECRET_ACCESS_KEY }}"
  data:
    - secretKey: AUTH_SECRET
      remoteRef:
        key: "d77267b4-2aae-4ee1-aab7-b4290186a5c7"
    - secretKey: OAUTH_CLIENT_SECRET
      remoteRef:
        key: "f8d48dc4-77cb-445c-ba49-b4290186f936"
    - secretKey: S3_ACCESS_KEY_ID
      remoteRef:
        key: "d1be29bb-4cca-4f41-9b3f-b42a00013dab"
    - secretKey: S3_SECRET_ACCESS_KEY
      remoteRef:
        key: "e30f2a9b-d114-4759-9a2c-b42a0001545d"
