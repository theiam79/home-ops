---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mealie
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      mealie:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/mealie-recipes/mealie
              tag: v3.19.2@sha256:f68e959bf66f4f458893ea58facac71690fe6f2ac7a31466b5cecb41b4e99c02
            env:
              TZ: America/Chicago
              BASE_URL: "https://recipes.${SECRET_DOMAIN}"
              ALLOW_SIGNUP: "false"
              DB_ENGINE: postgres
              POSTGRES_SERVER: mealie-pg-rw
              POSTGRES_PORT: "5432"
              POSTGRES_DB: mealie
              POSTGRES_USER:
                valueFrom:
                  secretKeyRef:
                    name: mealie-pg-app
                    key: username
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: mealie-pg-app
                    key: password
              OIDC_AUTH_ENABLED: "true"
              OIDC_PROVIDER_NAME: Authelia
              OIDC_CONFIGURATION_URL: "https://auth.${SECRET_DOMAIN}/.well-known/openid-configuration"
              OIDC_CLIENT_ID: mealie
              OIDC_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: mealie-secret
                    key: OIDC_CLIENT_SECRET
              OIDC_SIGNUP_ENABLED: "true"
              OIDC_AUTO_REDIRECT: "false"
              OIDC_ADMIN_GROUP: admins
              OPENAI_BASE_URL: "https://generativelanguage.googleapis.com/v1beta/openai/"
              OPENAI_MODEL: gemini-flash-latest
              OPENAI_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: mealie-secret
                    key: OPENAI_API_KEY
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/app/about
                    port: &port 9000
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 25m
                memory: 256Mi
    defaultPodOptions:
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: mealie
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "recipes.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      data:
        existingClaim: mealie
        globalMounts:
          - path: /app/data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
