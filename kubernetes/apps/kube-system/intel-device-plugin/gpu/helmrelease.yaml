---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-device-plugin-gpu
spec:
  chartRef:
    kind: OCIRepository
    name: intel-device-plugins-gpu
  interval: 1h
  dependsOn:
    - name: intel-device-plugin-operator
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    sharedDevNum: 3
    nodeFeatureRule: false
