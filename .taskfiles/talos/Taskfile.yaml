---
version: '3'

tasks:

  generate-config:
    desc: Render jinja Talos configs for all nodes into clusterconfig-jinja/ — bws-required
    dir: '{{.TALOS_DIR}}'
    cmd: |
      set -euo pipefail
      mkdir -p {{.TALOS_DIR}}/clusterconfig-jinja
      for node_file in {{.TALOS_DIR}}/nodes/*.yaml.j2; do
        node=$(basename "$node_file" .yaml.j2)
        echo ">> rendering $node"
        task talos:render-config NODE="$node" > "{{.TALOS_DIR}}/clusterconfig-jinja/$node.yaml"
      done
    preconditions:
      - test -d {{.TALOS_DIR}}/nodes
      - test -f {{.TALOS_DIR}}/machineconfig.yaml.j2

  render-config:
    desc: 'Render jinja Talos config for one node to stdout [NODE=hostname] — bws-required'
    dir: '{{.TALOS_DIR}}'
    cmd: |
      set -euo pipefail
      NODE_FILE="{{.TALOS_DIR}}/nodes/{{.NODE}}.yaml.j2"
      test -f "$NODE_FILE" || { echo "no template for {{.NODE}}: $NODE_FILE" >&2; exit 1; }
      # Detect CP vs worker from the per-node template's machine.type field.
      if [ "$(yq 'select(.machine.type) | .machine.type' "$NODE_FILE")" = "controlplane" ]; then
        export CONTROLPLANE=true
      else
        export CONTROLPLANE=false
      fi
      export TALOS_VERSION="$(yq '.talosVersion' "{{.TALOS_DIR}}/talenv.yaml")"
      export KUBERNETES_VERSION="$(yq '.kubernetesVersion' "{{.TALOS_DIR}}/talenv.yaml")"
      GLOBAL_TMP=$(mktemp) NODE_TMP=$(mktemp)
      trap "rm -f $GLOBAL_TMP $NODE_TMP" EXIT
      minijinja-cli --env --autoescape none {{.TALOS_DIR}}/machineconfig.yaml.j2 > "$GLOBAL_TMP"
      minijinja-cli --env --autoescape none "$NODE_FILE" > "$NODE_TMP"
      talosctl machineconfig patch "$GLOBAL_TMP" -p "@$NODE_TMP"
    requires:
      vars: [NODE]
    preconditions:
      - test -f {{.TALOS_DIR}}/machineconfig.yaml.j2
      - test -f {{.TALOS_DIR}}/talenv.yaml
      - which minijinja-cli talosctl yq

  talosconfig:
    desc: 'Materialize talosconfig from bws env vars — bws-required [FORCE=true to overwrite]'
    dir: '{{.TALOS_DIR}}'
    cmd: |
      set -euo pipefail
      mkdir -p {{.TALOS_DIR}}/clusterconfig
      if [ -f {{.TALOSCONFIG}} ] && [ "{{.FORCE}}" != "true" ]; then
        echo "talosconfig already exists at {{.TALOSCONFIG}} (pass FORCE=true to overwrite)" >&2
        exit 0
      fi
      SECRETS_TMP=$(mktemp)
      GEN_DIR=$(mktemp -d)
      trap "rm -rf $SECRETS_TMP $GEN_DIR" EXIT
      # talsecret.yaml uses ${VAR} placeholders; bws populates the env vars.
      envsubst < {{.TALOS_DIR}}/talsecret.yaml > "$SECRETS_TMP"
      talosctl gen config \
        --with-secrets "$SECRETS_TMP" \
        --output-dir "$GEN_DIR" \
        --output-types talosconfig \
        --force \
        kubernetes https://192.168.100.5:6443
      # Add every node IP to the talosconfig context so `talosctl --nodes …` works.
      NODES=$(grep -hoE 'address: 192\.168\.100\.[0-9]+' {{.TALOS_DIR}}/nodes/*.yaml.j2 \
              | awk '{print $NF}' | cut -d/ -f1 | sort -u | tr '\n' ' ')
      talosctl --talosconfig "$GEN_DIR/talosconfig" config node $NODES
      # Set endpoints to the control plane IPs (talosctl uses these for cluster-wide ops).
      CP_IPS=$(for f in {{.TALOS_DIR}}/nodes/*.yaml.j2; do
        if [ "$(yq 'select(.machine.type) | .machine.type' "$f")" = "controlplane" ]; then
          grep -oE 'address: 192\.168\.100\.[0-9]+' "$f" | head -1 | awk '{print $NF}' | cut -d/ -f1
        fi
      done | tr '\n' ' ')
      talosctl --talosconfig "$GEN_DIR/talosconfig" config endpoint $CP_IPS
      cp "$GEN_DIR/talosconfig" {{.TALOSCONFIG}}
      echo ">> wrote talosconfig to {{.TALOSCONFIG}} (nodes: $NODES; endpoints: $CP_IPS)"
    preconditions:
      - test -f {{.TALOS_DIR}}/talsecret.yaml
      - test -d {{.TALOS_DIR}}/nodes
      - which talosctl envsubst yq

  apply-node:
    desc: Apply Talos config to a node [IP=required] — bws-required
    dir: '{{.TALOS_DIR}}'
    cmd: |
      set -euo pipefail
      NODE=$(grep -l "address: {{.IP}}/" {{.TALOS_DIR}}/nodes/*.yaml.j2 | head -1 | xargs -n1 -r basename | sed 's/\.yaml\.j2$//')
      test -n "$NODE" || { echo "no node template matches IP={{.IP}}" >&2; exit 1; }
      task talos:render-config NODE="$NODE" | talosctl --nodes {{.IP}} apply-config -f /dev/stdin --mode={{.MODE}}
    vars:
      MODE: '{{.MODE | default "auto"}}'
    requires:
      vars: [IP]
    preconditions:
      - talosctl --nodes {{.IP}} get machineconfig
      - talosctl config info
      - test -f {{.TALOSCONFIG}}
      - which talosctl minijinja-cli yq

  join-node:
    desc: Apply Talos config to a new (maintenance-mode) node [IP=required] — bws-required
    dir: '{{.TALOS_DIR}}'
    cmd: |
      set -euo pipefail
      NODE=$(grep -l "address: {{.IP}}/" {{.TALOS_DIR}}/nodes/*.yaml.j2 | head -1 | xargs -n1 -r basename | sed 's/\.yaml\.j2$//')
      test -n "$NODE" || { echo "no node template matches IP={{.IP}}" >&2; exit 1; }
      until task talos:render-config NODE="$NODE" | talosctl --nodes {{.IP}} apply-config -f /dev/stdin --mode={{.MODE}} --insecure; do sleep 5; done
    vars:
      MODE: '{{.MODE | default "auto"}}'
    requires:
      vars: [IP]
    preconditions:
      - test -f {{.TALOSCONFIG}}
      - which talosctl minijinja-cli yq

  upgrade-node:
    desc: Upgrade Talos on a single node [IP=required] — bws-required
    dir: '{{.TALOS_DIR}}'
    cmd: |
      set -euo pipefail
      NODE=$(grep -l "address: {{.IP}}/" {{.TALOS_DIR}}/nodes/*.yaml.j2 | head -1 | xargs -n1 -r basename | sed 's/\.yaml\.j2$//')
      test -n "$NODE" || { echo "no node template matches IP={{.IP}}" >&2; exit 1; }
      # Pull the canonical install image straight from the rendered config so the
      # schematic + version stay single-sourced in machineconfig.yaml.j2 + talenv.yaml.
      IMAGE=$(task talos:render-config NODE="$NODE" | yq eval-all 'select(.machine.install.image) | .machine.install.image' - | head -1)
      test -n "$IMAGE" || { echo "could not extract install.image for $NODE" >&2; exit 1; }
      talosctl --nodes {{.IP}} upgrade --image "$IMAGE" --timeout=10m --reboot-mode=powercycle
    requires:
      vars: [IP]
    preconditions:
      - talosctl --nodes {{.IP}} get machineconfig
      - talosctl config info
      - test -f {{.TALOSCONFIG}}
      - which kubectl talosctl minijinja-cli yq

  upgrade-k8s:
    desc: Upgrade Kubernetes
    dir: '{{.TALOS_DIR}}'
    cmd: |
      KUBERNETES_VERSION="$(yq '.kubernetesVersion' {{.TALOS_DIR}}/talenv.yaml)"
      talosctl upgrade-k8s --to "$KUBERNETES_VERSION"
    preconditions:
      - talosctl config info
      - test -f {{.TALOSCONFIG}}
      - which talosctl yq

  reset:
    desc: Resets nodes back to maintenance mode
    dir: '{{.TALOS_DIR}}'
    prompt: This will destroy your cluster and reset the nodes back to maintenance mode... continue?
    cmd: |
      NODES=$(talosctl config info --output json | jq --exit-status --join-output '[.nodes[]] | join(",")')
      talosctl --nodes "$NODES" reset --reboot \
        {{if eq .CLI_FORCE false}}--system-labels-to-wipe STATE --system-labels-to-wipe EPHEMERAL{{end}} \
        --graceful=false --wait=false
    preconditions:
      - test -f {{.TALOSCONFIG}}
      - which talosctl jq

  shutdown-cluster:
    desc: Shutdown Talos across the whole cluster
    prompt: Shutdown the Talos cluster ... continue?
    cmd: talosctl shutdown --nodes {{.NODES}} --force
    vars:
      NODES:
        sh: talosctl config info --output json | jq --exit-status --join-output '[.nodes[]] | join(",")'
    preconditions:
      - talosctl --nodes {{.NODES}} get machineconfig
      - which jq talosctl
