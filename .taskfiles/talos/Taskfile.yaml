---
version: '3'

tasks:

  generate-config:
    desc: Generate Talos configuration (talhelper — legacy path during jinja migration)
    dir: '{{.TALOS_DIR}}'
    cmd: talhelper genconfig
    preconditions:
      - test -f {{.TALOS_DIR}}/talconfig.yaml
      # - test -f {{.ROOT_DIR}}/.sops.yaml
      # - test -f {{.SOPS_AGE_KEY_FILE}}
      - which talhelper

  render-config:
    desc: 'Render jinja Talos config for one node [NODE=hostname] — bws-required'
    dir: '{{.TALOS_DIR}}'
    cmd: |
      set -euo pipefail
      NODE_FILE="{{.TALOS_DIR}}/nodes/{{.NODE}}.yaml.j2"
      test -f "$NODE_FILE" || { echo "no template for {{.NODE}}: $NODE_FILE" >&2; exit 1; }
      if grep -q "type: controlplane" "$NODE_FILE"; then
        export CONTROLPLANE=true
      else
        export CONTROLPLANE=false
      fi
      GLOBAL_TMP=$(mktemp) NODE_TMP=$(mktemp)
      trap "rm -f $GLOBAL_TMP $NODE_TMP" EXIT
      minijinja-cli --env {{.TALOS_DIR}}/machineconfig.yaml.j2 > "$GLOBAL_TMP"
      minijinja-cli --env "$NODE_FILE" > "$NODE_TMP"
      talosctl machineconfig patch "$GLOBAL_TMP" -p "@$NODE_TMP"
    requires:
      vars: [NODE]
    preconditions:
      - test -f {{.TALOS_DIR}}/machineconfig.yaml.j2
      - which minijinja-cli talosctl

  render-all:
    desc: 'Render jinja Talos config for all nodes into clusterconfig-jinja/ — bws-required'
    dir: '{{.TALOS_DIR}}'
    cmd: |
      set -euo pipefail
      mkdir -p {{.TALOS_DIR}}/clusterconfig-jinja
      for node_file in {{.TALOS_DIR}}/nodes/*.yaml.j2; do
        node=$(basename "$node_file" .yaml.j2)
        echo ">> rendering $node"
        task talos:render-config NODE="$node" > "{{.TALOS_DIR}}/clusterconfig-jinja/$node.yaml"
      done
    preconditions:
      - test -d {{.TALOS_DIR}}/nodes

  diff-config:
    desc: 'Diff jinja-rendered config against talhelper output [NODE=hostname] — bws-required'
    dir: '{{.TALOS_DIR}}'
    cmd: |
      set -euo pipefail
      # Generate canonical reference output if not present
      if [ ! -f {{.TALOS_DIR}}/clusterconfig/{{.NODE}}.yaml ]; then
        echo ">> running task talos:generate-config first" >&2
        task talos:generate-config
      fi
      OLD={{.TALOS_DIR}}/clusterconfig/{{.NODE}}.yaml
      NEW=$(mktemp); trap "rm -f $NEW" EXIT
      task talos:render-config NODE={{.NODE}} > "$NEW"
      echo ">> diff (sort_keys-normalized)"
      diff -u <(yq eval-all 'sort_keys(..)' "$OLD") <(yq eval-all 'sort_keys(..)' "$NEW") || true
    requires:
      vars: [NODE]
    preconditions:
      - which yq python3 talosctl talhelper
      - test -f {{.TALOS_DIR}}/talconfig.yaml

  apply-node-jinja:
    desc: 'Apply jinja-rendered config to a node [IP=required, NODE=hostname required] — bws-required'
    dir: '{{.TALOS_DIR}}'
    cmd: |
      set -euo pipefail
      task talos:render-config NODE={{.NODE}} | talosctl --nodes {{.IP}} apply-config -f /dev/stdin --mode={{.MODE}}
    vars:
      MODE: '{{.MODE | default "auto"}}'
    requires:
      vars: [IP, NODE]
    preconditions:
      - talosctl --nodes {{.IP}} get machineconfig
      - test -f {{.TALOSCONFIG}}
      - which talosctl minijinja-cli

  apply-node:
    desc: Apply Talos config to a node [IP=required]
    dir: '{{.TALOS_DIR}}'
    cmd: talhelper gencommand apply --node {{.IP}} --extra-flags '--mode={{.MODE}}' | bash
    vars:
      MODE: '{{.MODE | default "auto"}}'
    requires:
      vars: [IP]
    preconditions:
      - talosctl --nodes {{.IP}} get machineconfig
      - talosctl config info
      - test -f {{.TALOSCONFIG}}
      - which talhelper talosctl yq

  join-node:
    desc: Apply Talos config to a new node [IP=required]
    dir: '{{.TALOS_DIR}}'
    cmd: until talhelper gencommand apply --node {{.IP}} --extra-flags '--mode={{.MODE}} --insecure' | bash; do sleep 5; done
    vars:
      MODE: '{{.MODE | default "auto"}}'
    requires:
      vars: [IP]
    preconditions:
      - talosctl config info
      - test -f {{.TALOSCONFIG}}
      - which talhelper talosctl yq

  upgrade-node:
    desc: Upgrade Talos on a single node [IP=required]
    dir: '{{.TALOS_DIR}}'
    cmd: talhelper gencommand upgrade --node {{.IP}} --extra-flags "--image='{{.TALOS_IMAGE}}:{{.TALOS_VERSION}}' --timeout=10m --reboot-mode=powercycle" | bash
    vars:
      TALOS_IMAGE:
        sh: yq '.nodes[] | select(.ipAddress == "{{.IP}}") | .talosImageURL' {{.TALOS_DIR}}/talconfig.yaml
      TALOS_VERSION:
        sh: yq '.talosVersion' {{.TALOS_DIR}}/talenv.yaml
    requires:
      vars: [IP]
    preconditions:
      - talosctl --nodes {{.IP}} get machineconfig
      - talosctl config info
      - test -f {{.TALOSCONFIG}}
      - which kubectl talhelper talosctl yq

  upgrade-k8s:
    desc: Upgrade Kubernetes
    dir: '{{.TALOS_DIR}}'
    cmd: talhelper gencommand upgrade-k8s --extra-flags "--to '{{.KUBERNETES_VERSION}}'" | bash
    vars:
      KUBERNETES_VERSION:
        sh: yq '.kubernetesVersion' {{.TALOS_DIR}}/talenv.yaml
    preconditions:
      - talosctl config info
      - test -f {{.TALOSCONFIG}}
      - which talhelper talosctl yq

  reset:
    desc: Resets nodes back to maintenance mode
    dir: '{{.TALOS_DIR}}'
    prompt: This will destroy your cluster and reset the nodes back to maintenance mode... continue?
    cmd: talhelper gencommand reset --extra-flags="--reboot {{- if eq .CLI_FORCE false }} --system-labels-to-wipe STATE --system-labels-to-wipe EPHEMERAL{{ end }} --graceful=false --wait=false" | bash
    preconditions:
      - which talhelper

  shutdown-cluster:
    desc: Shutdown Talos across the whole cluster
    prompt: Shutdown the Talos cluster ... continue?
    cmd: talosctl shutdown --nodes {{.NODES}} --force
    vars:
      NODES:
        sh: talosctl config info --output json | jq --exit-status --join-output '[.nodes[]] | join(",")'
    preconditions:
      - talosctl --nodes {{.NODES}} get machineconfig
      - which jq talosctl